<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ringkasan Pesanan - SISITUS</title>
    
    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="/assets/favicon/favicon.ico">
    <link rel="manifest" href="/assets/favicon/site.webmanifest">
    
    <!-- Styles -->
    <link rel="stylesheet" href="/assets/css/main.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">
    
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: #f5f5f5;
        }
        
        .page-container {
            min-height: 100vh;
            padding: 20px;
        }
    </style>
</head>
<body>
    <div id="order-summary-container" class="page-container">
        <!-- Content rendered by order-summary module -->
        <!-- Loading State -->
        <div id="loading-state" style="text-align: center; padding: 60px 20px;">
            <div class="spinner" style="display: inline-block; width: 40px; height: 40px; border: 4px solid #f3f3f3; border-top: 4px solid #2563EB; border-radius: 50%; animation: spin 1s linear infinite;"></div>
            <p style="margin-top: 20px; color: #666;">Memproses ringkasan pesanan...</p>
        </div>
        
        <!-- Error State -->
        <div id="error-state" style="display: none;"></div>
        
        <!-- Summary Content -->
        <div id="summary-content" style="display: none;"></div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script type="module">
        // Import order summary module logic
        import { render } from '/dashboard/js/modules/order-summary.js';
        
        // Render order summary (guest accessible, no auth required)
        render(null);
    </script>
</body>
</html>
