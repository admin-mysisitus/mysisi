<div id="content-payment"></div>

<style>
.order-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 20px;
}

.status-badge {
  padding: 10px 15px;
  border-radius: 6px;
  font-weight: 600;
  display: flex;
  align-items: center;
  gap: 8px;
  white-space: nowrap;
}

.status-badge.success {
  background-color: #d1fae5;
  color: #065f46;
}

.status-badge.warning {
  background-color: #fef3c7;
  color: #92400e;
}

.status-badge.danger {
  background-color: #fee2e2;
  color: #991b1b;
}

.status-badge.info {
  background-color: #dbeafe;
  color: #0c4a6e;
}

.status-icon {
  font-size: 18px;
}

.section {
  margin-bottom: 25px;
}

.section h3 {
  margin-top: 0;
  padding-bottom: 10px;
  border-bottom: 2px solid var(--color-primary);
  margin-bottom: 15px;
}

.order-summary {
  background-color: var(--color-bg-light);
  padding: 15px;
  border-radius: 6px;
}

.summary-row {
  display: flex;
  justify-content: space-between;
  padding: 10px 0;
  border-bottom: 1px solid var(--color-border);
}

.summary-row.total {
  border-bottom: none;
  font-size: 16px;
  font-weight: 700;
  color: var(--color-primary);
}

.summary-divider {
  border-top: 2px solid var(--color-border);
  margin: 10px 0;
  padding: 10px 0;
}

.details-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 20px;
}

.detail-item {
  background-color: var(--color-bg-light);
  padding: 15px;
  border-radius: 6px;
}

.detail-item label {
  display: block;
  font-weight: 600;
  color: var(--color-text-dark);
  margin-bottom: 5px;
  font-size: 12px;
}

.detail-item div {
  color: var(--color-text-dark);
  word-break: break-word;
}

.text-muted {
  color: var(--color-text-light);
  font-size: 12px;
}

.payment-status {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.status-item {
  display: flex;
  align-items: center;
  gap: 15px;
  padding: 15px;
  background-color: var(--color-bg-light);
  border-radius: 6px;
  border-left: 4px solid var(--color-border);
  transition: all 0.3s;
}

.status-item.completed {
  border-left-color: var(--color-success);
  background-color: #f0fdf4;
}

.status-check {
  min-width: 30px;
  height: 30px;
  background-color: white;
  border: 2px solid var(--color-border);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 700;
  color: var(--color-text-light);
  font-size: 16px;
}

.status-item.completed .status-check {
  background-color: var(--color-success);
  color: white;
  border-color: var(--color-success);
}

.status-text strong {
  display: block;
  margin-bottom: 3px;
}

.status-text small {
  color: var(--color-text-light);
  font-size: 12px;
}

.button-group {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  margin-top: 15px;
}

.btn-lg {
  padding: 15px 20px;
  font-size: 16px;
  font-weight: 600;
  flex: 1;
  min-width: 200px;
}

@media (max-width: 768px) {
  .order-header {
    flex-direction: column;
  }

  .details-grid {
    grid-template-columns: 1fr;
  }

  .button-group {
    flex-direction: column;
  }

  .btn-lg {
    min-width: 100%;
  }
}
</style>

<script>
// Move content from #content to #content-payment to ensure styling works
document.addEventListener('DOMContentLoaded', function() {
  const contentDiv = document.getElementById('content');
  const paymentDiv = document.getElementById('content-payment');
  if (contentDiv && paymentDiv && paymentDiv.parentElement === contentDiv) {
    // Move all siblings from content to payment div
    while (contentDiv.firstChild) {
      paymentDiv.appendChild(contentDiv.firstChild);
    }
  }
});
</script>
