<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Verifikasi Email - SISITUS">
  <title>Verifikasi Email - SISITUS</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="icon" href="/assets/favicon/favicon.ico" type="image/x-icon">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }

    .container {
      max-width: 500px;
      width: 100%;
      background: white;
      border-radius: 12px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      padding: 2rem;
      text-align: center;
    }

    .logo {
      font-size: 2rem;
      font-weight: bold;
      color: #667eea;
      margin-bottom: 1.5rem;
    }

    h2 {
      color: #2c3e50;
      margin-bottom: 0.5rem;
      font-size: 1.5rem;
    }

    p {
      color: #7f8c8d;
      line-height: 1.6;
      margin-bottom: 1rem;
    }

    .status-icon {
      font-size: 3rem;
      margin-bottom: 1rem;
    }

    .spinner {
      display: inline-block;
      height: 40px;
      width: 40px;
      border: 4px solid #f3f3f3;
      border-top: 4px solid #667eea;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .success-message {
      color: #27ae60;
    }

    .error-message {
      color: #c0392b;
    }

    .button-group {
      margin-top: 2rem;
      display: flex;
      gap: 1rem;
      flex-direction: column;
    }

    a, button {
      display: inline-block;
      padding: 0.75rem 1.5rem;
      border-radius: 6px;
      text-decoration: none;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: all 0.3s ease;
      font-size: 1rem;
    }

    .btn-primary {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
    }

    .btn-secondary {
      background: #ecf0f1;
      color: #2c3e50;
    }

    .btn-secondary:hover {
      background: #bdc3c7;
    }

    .info-box {
      background: #ecf0f1;
      border-left: 4px solid #667eea;
      padding: 1rem;
      margin: 1rem 0;
      text-align: left;
      border-radius: 4px;
    }

    .info-box strong {
      color: #667eea;
    }
  </style>
  <!-- SweetAlert2 for Elegant Notifications -->
  <link href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.js"></script>
</head>
<body>
  <div class="container">
    <div class="logo">SISITUS</div>
    
    <div id="status-content">
      <!-- Content will be inserted here by JavaScript -->
    </div>
  </div>

  <script type="module">
    import { GAS_CONFIG } from '/assets/js/config/api.config.js';
    
    const urlParams = new URLSearchParams(window.location.search);
    const token = urlParams.get('token');
    const statusContent = document.getElementById('status-content');
    const TIMEOUT = 30000; // 30 second timeout

    if (!token) {
      // Check if this is first visit (no token)
      const referrer = document.referrer;
      const fromRegistration = referrer.includes('/auth') || referrer.includes('register');
      
      if (fromRegistration) {
        showInfo(
          '📧 Cek Email Anda!',
          'Link verifikasi telah dikirim ke email Anda. Silakan buka email dan klik link verifikasi untuk mengaktifkan akun Anda.'
        );
      } else {
        showError(
          'Token Tidak Ditemukan',
          'Silakan gunakan link verifikasi email yang lengkap dari email Anda. Link harus berformat: https://mysisi.pages.dev/auth/verify-email.html?token=xxxxx'
        );
      }
    } else {
      showLoading('Memverifikasi Email...', 'Mohon tunggu sebentar');
      verifyEmailToken(token);
    }

    function showInfo(title, message) {
      statusContent.innerHTML = `
        <div class="status-icon" style="color: #3498db; font-size: 3rem;">
          <i class="fas fa-envelope"></i>
        </div>
        <h2 style="color: #3498db;">${title}</h2>
        <p>${message}</p>
        <div class="info-box">
          <strong><i class="fas fa-lightbulb"></i> Tips:</strong><br>
          Jika email tidak terlihat, cek folder:
          <ul style="margin-top: 10px; text-align: left; list-style: inside;">
            <li><strong>Spam/Junk</strong> - Pindahkan ke Inbox</li>
            <li><strong>Promotions/Tab lain</strong> - Cek semua tab di email</li>
          </ul>
        </div>
        <div class="button-group">
          <a href="/auth/" class="btn-secondary"><i class="fas fa-sign-in-alt"></i> Kembali ke Login</a>
          <a href="/" class="btn-secondary"><i class="fas fa-home"></i> Kembali ke Beranda</a>
        </div>
      `;
    }

    function showLoading(title, message) {
      statusContent.innerHTML = `
        <h2>${title}</h2>
        <p>${message}</p>
        <div style="margin: 2rem 0;">
          <div class="spinner"></div>
        </div>
      `;
    }

    function showSuccess(title, message) {
      statusContent.innerHTML = `
        <div class="status-icon success-message"><i class="fas fa-check-circle"></i></div>
        <h2 class="success-message">${title}</h2>
        <p>${message}</p>
        <div class="info-box">
          <strong><i class="fas fa-info-circle"></i> Langkah Berikutnya:</strong><br>
          Anda sekarang dapat login dengan email dan password Anda atau gunakan Google Sign-In untuk mulai membeli domain.
        </div>
        <div class="button-group">
          <a href="/dashboard/#!checkout" class="btn-primary"><i class="fas fa-user-plus"></i> Daftar Ulang</a>
          <a href="/" class="btn-secondary"><i class="fas fa-home"></i> Kembali ke Beranda</a>
        </div>
      `;
    }

    function showError(title, message) {
      statusContent.innerHTML = `
        <div class="status-icon error-message"><i class="fas fa-times-circle"></i></div>
        <h2 class="error-message">${title}</h2>
        <p>${message}</p>
        <div class="info-box">
          <strong><i class="fas fa-lightbulb"></i> Solusi:</strong><br>
          Cek email Anda kembali dan gunakan link verifikasi terbaru. Jika sudah tidak dapat ditemukan, silakan daftar ulang.
        </div>
        <div class="button-group">
          <a href="/checkout" class="btn-primary"><i class="fas fa-user-plus"></i> Daftar Ulang</a>
          <a href="/" class="btn-secondary"><i class="fas fa-home"></i> Kembali ke Beranda</a>
        </div>
      `;
    }

    async function verifyEmailToken(token) {
      const controller = new AbortController();
      const timeoutId = setTimeout(() => controller.abort(), TIMEOUT);

      try {
        const params = new URLSearchParams({
          action: 'verifyEmailToken',
          token: token
        });

        const apiUrl = `${GAS_CONFIG.URL}?${params}`;

        const response = await fetch(apiUrl, {
          signal: controller.signal
        });

        if (!response.ok) {
          throw new Error(`HTTP Error: ${response.status}`);
        }

        const data = await response.json();

        if (data.success) {
          showSuccess(
            '<i class="fas fa-check"></i> Email Berhasil Diverifikasi!',
            'Akun Anda sudah aktif dan siap digunakan.'
          );
          // Auto-redirect after 3 seconds
          setTimeout(() => {
            window.location.href = '/dashboard/#!checkout';
          }, 3000);
        } else {
          showError(
            '<i class="fas fa-exclamation-triangle"></i> Verifikasi Gagal',
            data.message || 'Token verifikasi tidak valid atau sudah kadaluarsa. Link verifikasi berlaku 24 jam.'
          );
        }
      } catch (error) {
        let errorTitle = '<i class="fas fa-exclamation-circle"></i> Terjadi Kesalahan';
        let errorMsg = 'Tidak dapat terhubung ke server. Silakan coba lagi nanti.';
        
        if (error.name === 'AbortError') {
          errorMsg = 'Permintaan timeout (lebih dari 30 detik). Server tidak merespons. Silakan: <br>1. Refresh halaman<br>2. Atau coba lagi dalam beberapa menit';
        } else if (error instanceof TypeError) {
          errorMsg = 'Kesalahan jaringan. Periksa koneksi internet Anda dan coba lagi. Jika masalah berlanjut, hubungi support.';
        }
        
        showError(errorTitle, errorMsg);
      } finally {
        clearTimeout(timeoutId);
      }
    }
  </script>
</body>
</html>
