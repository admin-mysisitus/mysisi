<body class="login-body">
  <div class="login-container">
    <div class="login-left">
      <div class="login-logo">
        <img src="../../assets/img/logo/logo512x512.webp" alt="Logo PPAI Darul Huda" width="128" height="128" loading="lazy">
        <h1>PPAI Darul Huda</h1>
        <p>Platform Digital Pondok Pesantren</p>
      </div>
      <div class="login-illustration">
        <img src="../../assets/img/illustration/register-illustration.webp" alt="Ilustrasi Pendaftaran" loading="lazy" aria-hidden="true">
      </div>
    </div>
    <div class="login-right">
      <div class="login-card">
        <h2>Daftar Akun Pondigi</h2>
        <p>Pilih peran dan isi data untuk membuat akun akses dashboard.</p>
        
        <div class="role-selection">
          <button class="role-btn active" data-role="wali" aria-pressed="true" aria-label="Pilih Peran Wali Santri">
            <i class="fas fa-user-friends"></i> Wali Santri
          </button>
          <button class="role-btn" data-role="pengurus" aria-pressed="false" aria-label="Pilih Peran Pengurus">
            <i class="fas fa-user-tie"></i> Pengurus
          </button>
        </div>

        <form id="register-form" class="login-form" aria-label="Formulir Pendaftaran">
          <div class="form-group">
            <label for="fullname">Nama Lengkap</label>
            <input type="text" id="fullname" name="fullname" placeholder="Masukkan nama lengkap" required aria-required="true">
          </div>
          <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" placeholder="Masukkan email aktif" required aria-required="true">
          </div>
          <div class="form-group">
            <label for="phone">Nomor HP</label>
            <input type="tel" id="phone" name="phone" placeholder="Masukkan nomor HP aktif" required aria-required="true">
          </div>
          <div class="form-group" id="santri-id-group" style="display: block;">
            <label for="santri-id">ID Santri (untuk Wali)</label>
            <input type="text" id="santri-id" name="santri-id" placeholder="Masukkan ID santri yang diasuh" required aria-required="true">
          </div>
          <div class="form-group" id="staff-id-group" style="display: none;">
            <label for="staff-id">ID Pengurus (untuk Pengurus)</label>
            <input type="text" id="staff-id" name="staff-id" placeholder="Masukkan ID pengurus" required aria-required="true">
          </div>
          <div class="form-group">
            <label for="username">Nama Pengguna</label>
            <input type="text" id="username" name="username" placeholder="Buat nama pengguna" required aria-required="true">
          </div>
          <div class="form-group">
            <label for="password">Kata Sandi</label>
            <div class="password-input">
              <input type="password" id="password" name="password" placeholder="Buat kata sandi (min 8 karakter)" required aria-required="true">
              <button type="button" class="toggle-password" aria-label="Tampilkan/Sembunyikan Kata Sandi"><i class="fas fa-eye"></i></button>
            </div>
          </div>
          <div class="form-group">
            <label for="confirm-password">Konfirmasi Kata Sandi</label>
            <input type="password" id="confirm-password" name="confirm-password" placeholder="Ulangi kata sandi" required aria-required="true">
          </div>
          <div class="form-options">
            <label class="remember-me">
              <input type="checkbox" name="terms" required aria-required="true"> Saya menyetujui <a href="../terms.html">Syarat & Ketentuan</a>
            </label>
          </div>
          <button type="submit" class="login-btn" aria-label="Daftar">
            <i class="fas fa-user-plus"></i> Daftar
          </button>
        </form>

        <div class="login-footer">
          <p>Sudah memiliki akun? <a href="login.html" class="login-link">Masuk di sini</a></p>
          <p><a href="../index.html" class="back-home">Kembali ke Beranda</a></p>
        </div>
      </div>
    </div>
  </div>
