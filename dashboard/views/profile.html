<div class="card">
  <div class="card-header">
    <h1 class="card-title">Profil Saya</h1>
  </div>

  <div class="card-body">
    <!-- Edit Profile Form -->
    <h3>Informasi Akun</h3>
    <form id="form-edit-profile">
      <div class="form-group">
        <label class="form-label">Nama Lengkap</label>
        <input type="text" id="input-name" class="form-control" required>
      </div>

      <div class="form-group">
        <label class="form-label">Nomor WhatsApp</label>
        <input type="tel" id="input-whatsapp" class="form-control" placeholder="08xxxxxxxxxx">
      </div>

      <button type="submit" class="btn btn-primary">Simpan Profil</button>
    </form>

    <hr style="margin: 30px 0;">

    <!-- Change Password Form -->
    <h3>Ubah Password</h3>
    <form id="form-change-password">
      <div class="form-group">
        <label class="form-label">Password Lama</label>
        <input type="password" id="input-old-password" class="form-control" required>
      </div>

      <div class="form-group">
        <label class="form-label">Password Baru</label>
        <input type="password" id="input-new-password" class="form-control" required>
        <small>Minimal 8 karakter</small>
      </div>

      <div class="form-group">
        <label class="form-label">Konfirmasi Password</label>
        <input type="password" id="input-confirm-password" class="form-control" required>
      </div>

      <button type="submit" class="btn btn-primary">Ubah Password</button>
    </form>
  </div>
</div>
