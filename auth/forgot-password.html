<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lupa Password - SISITUS</title>
  <link rel="icon" href="/assets/favicon/favicon.ico" type="image/x-icon">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      width: 100%;
      max-width: 400px;
    }

    .forgot-card {
      background: white;
      border-radius: 12px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
      padding: 40px;
      animation: slideUp 0.5s ease-out;
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .forgot-header {
      text-align: center;
      margin-bottom: 30px;
    }

    .forgot-header h1 {
      font-size: 28px;
      color: #333;
      margin-bottom: 10px;
    }

    .forgot-header p {
      color: #666;
      font-size: 14px;
      line-height: 1.5;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      font-weight: 600;
      color: #333;
      margin-bottom: 8px;
      font-size: 14px;
    }

    .form-group input {
      width: 100%;
      padding: 12px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 14px;
      transition: all 0.3s;
    }

    .form-group input:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }

    .form-group input::placeholder {
      color: #999;
    }

    .submit-btn {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 6px;
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.3s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .submit-btn:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
    }

    .submit-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .submit-btn i {
      font-size: 16px;
    }

    .message {
      padding: 12px;
      border-radius: 6px;
      margin-top: 15px;
      font-size: 14px;
      display: none;
      animation: slideIn 0.3s ease-out;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(-10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .message.show {
      display: block;
    }

    .message.success {
      background-color: #d4edda;
      color: #155724;
      border: 1px solid #c3e6cb;
    }

    .message.error {
      background-color: #f8d7da;
      color: #721c24;
      border: 1px solid #f5c6cb;
    }

    .message.info {
      background-color: #d1ecf1;
      color: #0c5460;
      border: 1px solid #bee5eb;
    }

    .links {
      text-align: center;
      margin-top: 20px;
      display: flex;
      gap: 15px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .links a {
      font-size: 13px;
      color: #667eea;
      text-decoration: none;
      transition: color 0.3s;
    }

    .links a:hover {
      color: #764ba2;
      text-decoration: underline;
    }

    .loading-spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-radius: 50%;
      border-top-color: white;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .icon-check {
      color: #28a745;
      font-size: 48px;
      margin-bottom: 15px;
    }

    .success-state {
      text-align: center;
      display: none;
    }

    .success-state.show {
      display: block;
    }

    .form-state {
      display: block;
    }

    .form-state.hide {
      display: none;
    }

    @media (max-width: 600px) {
      .forgot-card {
        padding: 30px 20px;
      }

      .forgot-header h1 {
        font-size: 24px;
      }
    }
  </style>
  <!-- SweetAlert2 for Elegant Notifications -->
  <link href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.js"></script>
</head>
<body>
  <div class="container">
    <div class="forgot-card">
      <!-- Form State -->
      <div class="form-state" id="formState">
        <div class="forgot-header">
          <h1>Lupa Password?</h1>
          <p>Masukkan email Anda untuk menerima link reset password</p>
        </div>

        <form id="forgotForm" onsubmit="handleSubmit(event)">
          <div class="form-group">
            <label for="email">Alamat Email</label>
            <input 
              type="email" 
              id="email" 
              placeholder="nama@example.com" 
              required
              autocomplete="email"
            >
          </div>

          <button type="submit" class="submit-btn" id="submitBtn">
            <i class="fas fa-paper-plane"></i>
            <span id="btnText">Kirim Link Reset</span>
          </button>
        </form>

        <div class="message" id="formMessage"></div>

        <div class="links">
          <a href="/dashboard/#!checkout" title="Kembali ke checkout">
            <i class="fas fa-arrow-left"></i> Kembali
          </a>
          <span style="color: #ccc;">|</span>
          <a href="/auth/" title="Sudah punya akun? Login">
            Login
          </a>
        </div>
      </div>

      <!-- Success State -->
      <div class="success-state" id="successState">
        <div class="icon-check">
          <i class="fas fa-check-circle"></i>
        </div>
        <h2 style="color: #28a745; margin-bottom: 10px;">Email Terkirim!</h2>
        <p style="color: #666; margin-bottom: 20px;">
          Kami telah mengirim link reset password ke email Anda. 
          Link ini berlaku selama 24 jam.
        </p>
        <p style="color: #999; font-size: 13px; margin-bottom: 15px;">
          Cek folder spam jika tidak menerima email dalam beberapa menit.
        </p>
        <div class="links">
          <a href="/verify-email.html" title="Kembali ke login">
            <i class="fas fa-arrow-left"></i> Kembali ke Login
          </a>
        </div>
      </div>
    </div>
  </div>

  <script type="module">
    import { GAS_CONFIG } from '/assets/js/config/api.config.js';
    const TIMEOUT = 30000; // 30 second timeout

    function handleSubmit(event) {
      event.preventDefault();

      const email = document.getElementById('email').value.trim();
      const submitBtn = document.getElementById('submitBtn');
      const btnText = document.getElementById('btnText');
      const message = document.getElementById('formMessage');

      // Validate email
      if (!email) {
        showMessage('Silakan masukkan email', 'error');
        return;
      }

      // Validate email format
      const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
      if (!emailRegex.test(email)) {
        showMessage('Format email tidak valid', 'error');
        return;
      }

      // Show loading
      submitBtn.disabled = true;
      btnText.innerHTML = '<span class="loading-spinner"></span> Mengirim...';

      // Send request with timeout
      const controller = new AbortController();
      const timeoutId = setTimeout(() => controller.abort(), TIMEOUT);

      const params = new URLSearchParams({
        action: 'requestPasswordReset',
        email: email
      });

      fetch(`${GAS_CONFIG.URL}?${params}`, { signal: controller.signal })
        .then(r => {
          if (!r.ok) throw new Error(`HTTP Error: ${r.status}`);
          return r.json();
        })
        .then(result => {
          if (result.success) {
            // Show success state
            document.getElementById('formState').classList.add('hide');
            document.getElementById('successState').classList.add('show');
          } else {
            showMessage(result.message || 'Email tidak ditemukan atau terjadi kesalahan', 'error');
            submitBtn.disabled = false;
            btnText.innerHTML = '<i class="fas fa-paper-plane"></i> Kirim Link Reset';
          }
        })
        .catch(error => {
          console.error('Error:', error);
          let errorMsg = 'Gagal menghubungi server';
          if (error.name === 'AbortError') {
            errorMsg = 'Permintaan timeout. Silakan coba lagi.';
          } else if (error instanceof TypeError) {
            errorMsg = 'Kesalahan jaringan. Periksa koneksi internet Anda.';
          }
          showMessage(errorMsg, 'error');
          submitBtn.disabled = false;
          btnText.innerHTML = '<i class="fas fa-paper-plane"></i> Kirim Link Reset';
        })
        .finally(() => clearTimeout(timeoutId));
    }

    function showMessage(text, type) {
      const message = document.getElementById('formMessage');
      message.textContent = text;
      message.className = `message show ${type}`;

      if (type === 'error') {
        setTimeout(() => {
          message.classList.remove('show');
        }, 5000);
      }
    }

    // Auto-focus email input
    window.addEventListener('load', () => {
      document.getElementById('email').focus();
    });
  </script>
</body>
</html>
