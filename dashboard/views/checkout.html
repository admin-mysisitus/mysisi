<div class="card">
  <div class="card-header">
    <h1 class="card-title">Pesan Domain Baru</h1>
  </div>

  <div class="card-body">
    <div id="checkout-alerts"></div>

    <!-- Domain Summary -->
    <div class="section">
      <h3>🌐 1. Domain</h3>
      <div id="domain-summary"></div>
    </div>

    <!-- Package Selection -->
    <div class="section">
      <h3>📦 2. Pilih Paket</h3>
      <div id="packages-grid" class="packages-grid"></div>
    </div>

    <!-- Checkout Form -->
    <div class="section">
      <h3>👤 3. Data Pelanggan</h3>
      <form id="checkout-form" class="checkout-form">
        <div class="form-group">
          <label class="form-label">Nama Lengkap *</label>
          <input type="text" name="fullname" class="form-control" placeholder="Nama lengkap Anda" required>
          <small class="form-help"></small>
        </div>

        <div class="form-group">
          <label class="form-label">Email *</label>
          <input type="email" name="email" class="form-control" placeholder="email@example.com" required>
          <small class="form-help"></small>
        </div>

        <div class="form-group">
          <label class="form-label">Nomor Telepon *</label>
          <input type="tel" name="phone" class="form-control" placeholder="08xxxxxxxxxx" required>
          <small class="form-help"></small>
        </div>

        <div class="form-group">
          <label class="form-label">Alamat Lengkap *</label>
          <textarea name="address" class="form-control" rows="4" placeholder="Jalan, No, Kota, Provinsi" required></textarea>
          <small class="form-help"></small>
        </div>

        <div class="form-group">
          <label class="form-label">🎉 Kode Promo (Opsional)</label>
          <input type="text" name="promoCode" class="form-control" placeholder="Masukkan kode promo jika ada" autocomplete="off">
          <small class="form-help"></small>
        </div>

        <div class="form-group">
          <label class="form-label">
            <input type="checkbox" name="tos" required>
            Saya menyetujui Syarat & Ketentuan
          </label>
        </div>
      </form>
    </div>

    <!-- Order Summary -->
    <div class="section">
      <h3>💰 4. Ringkasan Pesanan</h3>
      <div id="order-summary"></div>
    </div>

    <!-- Checkout Button -->
    <div class="section">
      <button id="btn-checkout" class="btn btn-primary btn-lg btn-block btn-checkout">
        ✓ Lanjut ke Pembayaran
      </button>
    </div>
  </div>
</div>
